[supervisord]
nodaemon=true

[program:api]
command=uvicorn src.app.main:app --host 0.0.0.0 --port 8000
autostart=true
autorestart=true
priority=20

[program:grafana]
command=/run.sh
autostart=true
autorestart=true
startretries=5
startsecs=5
priority=15

[program:prometheus]
command=/usr/local/bin/prometheus --config.file=/etc/prometheus/prometheus.yml
autostart=true
autorestart=true
priority=40

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10